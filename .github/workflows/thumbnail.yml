name: 📸 Thumbnail

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: 📦 Install Dependencies
        run: |
          npm install
          npx playwright install --with-deps

      - name: 📸 Generate Thumbnail
        run: node generate-thumbnail.js
        env:
          URL: https://talkled-ficilabs.vercel.app/

      - name: 💾 Commit & Push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add thumbnails/
          git commit -m "📸 update thumbnail" || echo "no changes"
          git push
